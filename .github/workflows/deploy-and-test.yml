name: CI/CD – Deploy to Cloud Run with Automated API Testing

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    outputs:
      cloud_run_url: ${{ steps.tf.outputs.cloud_run_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker europe-west2-docker.pkg.dev

      - name: Build & push image
        run: |
          IMAGE="europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ddr/incident-ddr:latest"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        id: tf
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="image=${{ env.IMAGE }}"

          echo "cloud_run_url=$(terraform output -raw cloud_run_url)" >> $GITHUB_OUTPUT
  
  quality-gates:
    name: Quality Gates – Unit Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/unit


  sonar-security-scan:
    name: Security Scan – Sonar (SAST)
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests with coverage
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt coverage
          coverage run -m pytest tests/unit
          coverage xml

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}


  postman-tests:
    name: Run Postman / Newman Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Validate Postman artefacts
        run: |
          jq . postman/incident-ddr-collection.json
          jq . postman/incident-ddr-environment.json

      - name: Update baseUrl for Cloud Run
        run: |
          jq --arg url "${{ needs.deploy.outputs.cloud_run_url }}" \
            '.values[] |= if .key=="baseUrl" then .value=$url else . end' \
            postman/incident-ddr-environment.json > postman/env.tmp.json
          mv postman/env.tmp.json postman/incident-ddr-environment.json

      - name: Run Newman integration tests
        run: |
          newman run postman/incident-ddr-collection.json \
            -e postman/incident-ddr-environment.json

  playwright-tests:
    name: Run Playwright End‑to‑End & Integration Tests
    runs-on: ubuntu-latest
    needs: deploy

   
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright integration, negative & edge‑case tests
        env:
          BASE_URL: ${{ needs.deploy.outputs.cloud_run_url }}
        run: |
          npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
